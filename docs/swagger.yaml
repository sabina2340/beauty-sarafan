swagger: "2.0"
info:
  description: API платформы Beauty Sarafan
  title: Beauty Sarafan API
  contact: {}
  version: "1.0"
host: localhost:8080
basePath: /
securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: Bearer <token> (Swagger) или HttpOnly cookie access_token
paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Регистрация пользователя
  /auth/login:
    post:
      tags: [auth]
      summary: Логин пользователя
  /auth/me:
    get:
      tags: [auth]
      summary: Проверка авторизации
  /me/profile:
    get:
      tags: [me]
      summary: Профиль текущего пользователя
    put:
      tags: [me]
      summary: Создание/обновление профиля мастера
  /categories:
    get:
      tags: [categories]
      summary: Список категорий
  /masters:
    get:
      tags: [masters]
      summary: Публичный каталог мастеров
  /masters/{id}:
    get:
      tags: [masters]
      summary: Детальная карточка мастера
  /admin/ping:
    get:
      tags: [admin]
      summary: Проверка admin/moderator доступа
  /admin/masters:
    get:
      tags: [admin]
      summary: Список мастеров для модерации
  /admin/users/{id}/moderate:
    patch:
      tags: [admin]
      summary: Модерация пользователя
  /admin/users/{id}/approve:
    patch:
      tags: [admin]
      summary: Одобрить пользователя
  /admin/users/{id}/reject:
    patch:
      tags: [admin]
      summary: Отклонить пользователя
  /admin/categories:
    post:
      tags: [categories]
      summary: Создать категорию
  /ads:
    post:
      tags: [ads]
      summary: Тест создания объявления
definitions: {}
