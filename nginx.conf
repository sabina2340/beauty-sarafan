server {
    listen 80;
    server_name xn--80aaa6cmey.art www.xn--80aaa6cmey.art;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xn--80aaa6cmey.art www.xn--80aaa6cmey.art;

    ssl_certificate /etc/letsencrypt/live/xn--80aaa6cmey.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80aaa6cmey.art/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
